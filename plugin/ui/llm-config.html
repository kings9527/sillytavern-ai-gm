<!-- AI-GM LLM Configuration Panel -->
<!--
  LLM Configuration Interface for AI-GM Plugin
  Provides a form to configure LLM provider, model, API key, and parameters.
  Can be embedded directly or loaded as a template.
  -->

  <div class="ai-gm-llm-panel" id="ai-gm-llm-panel">
    <div class="ai-gm-panel-header">
      <h2>🤖 LLM 配置</h2>
      <p class="ai-gm-subtitle">配置 AI 游戏大师的 LLM 连接参数</p>
    </div>

    <div class="ai-gm-panel-body">
      <!-- Provider Selection -->
      <div class="ai-gm-form-section">
        <h3>提供商设置</h3>
        <div class="ai-gm-form-grid">
          <div class="ai-gm-form-group ai-gm-form-group-wide">
            <label for="llm-provider">LLM 提供商</label>
            <select id="llm-provider" class="ai-gm-select">
              <option value="openai">OpenAI (GPT-4 / GPT-3.5)</option>
              <option value="claude">Anthropic Claude</option>
              <option value="ollama">Ollama (本地)</option>
              <option value="sillytavern">SillyTavern 代理</option>
              <option value="custom">自定义 (OpenAI 兼容)</option>
            </select>
            <span class="ai-gm-help-text">选择要使用的 LLM 服务提供商</span>
          </div>
        </div>
      </div>

      <!-- Connection Settings -->
      <div class="ai-gm-form-section">
        <h3>连接设置</h3>
        <div class="ai-gm-form-grid">
          <div class="ai-gm-form-group ai-gm-form-group-wide">
            <label for="llm-base-url">API 地址</label>
            <input type="text" id="llm-base-url" class="ai-gm-input" placeholder="https://api.openai.com/v1">
            <span class="ai-gm-help-text">API 的基础 URL 地址</span>
          </div>

          <div class="ai-gm-form-group ai-gm-form-group-wide">
            <label for="llm-api-key">API Key</label>
            <div class="ai-gm-input-group">
              <input type="password" id="llm-api-key" class="ai-gm-input" placeholder="sk-...">
              <button type="button" class="ai-gm-input-btn" id="toggle-api-key" title="显示/隐藏">
                👁
              </button>
            </div>
            <span class="ai-gm-help-text">你的 API 密钥，仅在本地存储</span>
          </div>

          <div class="ai-gm-form-group ai-gm-form-group-wide">
            <label for="llm-model">模型名称</label>
            <input type="text" id="llm-model" class="ai-gm-input" placeholder="gpt-4o-mini" list="model-suggestions">
            <datalist id="model-suggestions">
              <option value="gpt-4o">
              <option value="gpt-4o-mini">
              <option value="gpt-4-turbo">
              <option value="claude-3-sonnet-20240229">
              <option value="claude-3-opus-20240229">
              <option value="claude-3-haiku-20240307">
              <option value="llama3">
              <option value="llama3.1">
              <option value="mistral">
              <option value="qwen2.5">
            </datalist>
            <span class="ai-gm-help-text">要使用的具体模型名称</span>
          </div>
        </div>
      </div>

      <!-- Generation Parameters -->
      <div class="ai-gm-form-section">
        <h3>生成参数</h3>
        <div class="ai-gm-form-grid">
          <div class="ai-gm-form-group">
            <label for="llm-max-tokens">Max Tokens</label>
            <input type="number" id="llm-max-tokens" class="ai-gm-input" value="512" min="64" max="4096" step="64">
            <span class="ai-gm-help-text">最大生成令牌数</span>
          </div>

          <div class="ai-gm-form-group">
            <label for="llm-temperature">Temperature</label>
            <input type="number" id="llm-temperature" class="ai-gm-input" value="0.7" min="0" max="2" step="0.1">
            <span class="ai-gm-help-text">随机性 (0=确定性, 2=完全随机)</span>
          </div>

          <div class="ai-gm-form-group">
            <label for="llm-timeout">超时 (ms)</label>
            <input type="number" id="llm-timeout" class="ai-gm-input" value="30000" min="1000" max="120000" step="1000">
            <span class="ai-gm-help-text">请求超时时间</span>
          </div>

          <div class="ai-gm-form-group">
            <label for="llm-retries">重试次数</label>
            <input type="number" id="llm-retries" class="ai-gm-input" value="2" min="0" max="5" step="1">
            <span class="ai-gm-help-text">失败后的重试次数</span>
          </div>
        </div>
      </div>

      <!-- Advanced Settings -->
      <div class="ai-gm-form-section">
        <h3>高级设置</h3>
        <div class="ai-gm-form-grid">
          <div class="ai-gm-form-group ai-gm-form-group-wide">
            <label class="ai-gm-checkbox-label">
              <input type="checkbox" id="llm-use-cache" class="ai-gm-checkbox" checked>
              <span>启用响应缓存</span>
            </label>
            <span class="ai-gm-help-text">缓存相同请求的响应以减少 API 调用</span>
          </div>

          <div class="ai-gm-form-group ai-gm-form-group-wide">
            <label class="ai-gm-checkbox-label">
              <input type="checkbox" id="llm-stream-mode" class="ai-gm-checkbox">
              <span>流式输出</span>
            </label>
            <span class="ai-gm-help-text">逐字接收 LLM 响应 (实验性功能)</span>
          </div>
        </div>
      </div>
    </div>

    <div class="ai-gm-panel-footer">
      <div class="ai-gm-test-result" id="llm-test-result"></div>
      <div class="ai-gm-actions">
        <button type="button" class="ai-gm-btn ai-gm-btn-secondary" id="llm-reset-btn">重置默认</button>
        <button type="button" class="ai-gm-btn ai-gm-btn-info" id="llm-test-btn">🔌 测试连接</button>
        <button type="button" class="ai-gm-btn ai-gm-btn-primary" id="llm-save-btn">💾 保存配置</button>
      </div>
    </div>
  </div>

  <script type="module">
    /**
     * LLM Config Panel Controller
     * Handles form binding, validation, API calls, and state management
     */
    class LLMConfigController {
      constructor() {
        this.apiBase = '/api/plugins/ai-gm';
        this.defaultConfig = {
          provider: 'openai',
          baseUrl: 'https://api.openai.com/v1',
          apiKey: '',
          model: 'gpt-4o-mini',
          maxTokens: 512,
          temperature: 0.7,
          timeout: 30000,
          retries: 2,
          useCache: true,
          streamMode: false,
        };
        this.elements = {};
        this.init();
      }

      init() {
        this.bindElements();
        this.loadConfig();
        this.attachListeners();
      }

      bindElements() {
        this.elements = {
          provider: document.getElementById('llm-provider'),
          baseUrl: document.getElementById('llm-base-url'),
          apiKey: document.getElementById('llm-api-key'),
          model: document.getElementById('llm-model'),
          maxTokens: document.getElementById('llm-max-tokens'),
          temperature: document.getElementById('llm-temperature'),
          timeout: document.getElementById('llm-timeout'),
          retries: document.getElementById('llm-retries'),
          useCache: document.getElementById('llm-use-cache'),
          streamMode: document.getElementById('llm-stream-mode'),
          testResult: document.getElementById('llm-test-result'),
          saveBtn: document.getElementById('llm-save-btn'),
          testBtn: document.getElementById('llm-test-btn'),
          resetBtn: document.getElementById('llm-reset-btn'),
          toggleApiKey: document.getElementById('toggle-api-key'),
        };
      }

      attachListeners() {
        const { saveBtn, testBtn, resetBtn, toggleApiKey, provider } = this.elements;

        if (saveBtn) saveBtn.addEventListener('click', () => this.saveConfig());
        if (testBtn) testBtn.addEventListener('click', () => this.testConnection());
        if (resetBtn) resetBtn.addEventListener('click', () => this.resetToDefault());
        if (toggleApiKey) toggleApiKey.addEventListener('click', () => this.toggleApiKeyVisibility());
        if (provider) provider.addEventListener('change', () => this.onProviderChange());
      }

      async loadConfig() {
        try {
          this.showTestResult('加载配置中...', 'info');
          const response = await fetch(`${this.apiBase}/llm/config`);
          const data = await response.json();

          if (!data.success) {
            this.showTestResult('配置加载失败', 'error');
            return;
          }

          const config = data.config || {};
          this.populateForm(config);
          this.showTestResult(
            `配置已加载 | 提供商: ${config.provider || 'unknown'} | 模型: ${config.model || 'unknown'} | 状态: ${data.available ? '可用' : '不可用'}`,
            data.available ? 'success' : 'warning'
          );
        } catch (error) {
          this.showTestResult(`加载失败: ${error.message}`, 'error');
        }
      }

      populateForm(config) {
        const els = this.elements;
        if (els.provider) els.provider.value = config.provider || this.defaultConfig.provider;
        if (els.baseUrl) els.baseUrl.value = config.baseUrl || this.defaultConfig.baseUrl;
        if (els.apiKey) els.apiKey.value = config.apiKey || '';
        if (els.model) els.model.value = config.model || this.defaultConfig.model;
        if (els.maxTokens) els.maxTokens.value = config.maxTokens || this.defaultConfig.maxTokens;
        if (els.temperature) els.temperature.value = config.temperature !== undefined ? config.temperature : this.defaultConfig.temperature;
        if (els.timeout) els.timeout.value = config.timeout || this.defaultConfig.timeout;
      }

      collectFormData() {
        const els = this.elements;
        return {
          provider: els.provider?.value || 'openai',
          baseUrl: els.baseUrl?.value || '',
          apiKey: els.apiKey?.value || '',
          model: els.model?.value || 'gpt-4o-mini',
          maxTokens: parseInt(els.maxTokens?.value || '512', 10),
          temperature: parseFloat(els.temperature?.value || '0.7'),
          timeout: parseInt(els.timeout?.value || '30000', 10),
          retries: parseInt(els.retries?.value || '2', 10),
        };
      }

      validateConfig(config) {
        const errors = [];
        if (!config.provider) errors.push('请选择提供商');
        if (!config.model) errors.push('请填写模型名称');
        if (!config.baseUrl) errors.push('请填写 API 地址');
        if (config.maxTokens < 1 || config.maxTokens > 8192) errors.push('Max Tokens 范围无效');
        if (config.temperature < 0 || config.temperature > 2) errors.push('Temperature 范围无效');
        return errors;
      }

      async saveConfig() {
        const config = this.collectFormData();
        const errors = this.validateConfig(config);

        if (errors.length > 0) {
          this.showTestResult(`验证失败: ${errors.join(', ')}`, 'error');
          return;
        }

        try {
          this.showTestResult('保存中...', 'info');
          const response = await fetch(`${this.apiBase}/llm/config`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(config),
          });
          const data = await response.json();

          if (data.success) {
            this.showTestResult('✅ 配置已保存', 'success');
          } else {
            this.showTestResult(`❌ 保存失败: ${data.error}`, 'error');
          }
        } catch (error) {
          this.showTestResult(`❌ 保存失败: ${error.message}`, 'error');
        }
      }

      async testConnection() {
        try {
          this.showTestResult('测试连接中...', 'info');
          const response = await fetch(`${this.apiBase}/llm/test`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
          });
          const data = await response.json();

          if (data.success) {
            this.showTestResult(`✅ 连接成功! 响应: ${data.response?.substring(0, 100) || 'OK'}`, 'success');
          } else {
            this.showTestResult(`❌ 连接失败: ${data.error}`, 'error');
          }
        } catch (error) {
          this.showTestResult(`❌ 连接测试失败: ${error.message}`, 'error');
        }
      }

      resetToDefault() {
        this.populateForm(this.defaultConfig);
        this.showTestResult('已重置为默认配置', 'info');
      }

      toggleApiKeyVisibility() {
        const el = this.elements.apiKey;
        if (!el) return;
        el.type = el.type === 'password' ? 'text' : 'password';
      }

      onProviderChange() {
        const provider = this.elements.provider?.value;
        const presets = {
          openai: { baseUrl: 'https://api.openai.com/v1', model: 'gpt-4o-mini' },
          claude: { baseUrl: 'https://api.anthropic.com', model: 'claude-3-sonnet-20240229' },
          ollama: { baseUrl: 'http://localhost:11434', model: 'llama3' },
          sillytavern: { baseUrl: 'http://localhost:5000/api', model: '' },
          custom: { baseUrl: '', model: '' },
        };

        const preset = presets[provider];
        if (preset) {
          if (this.elements.baseUrl && !this.elements.baseUrl.value) {
            this.elements.baseUrl.value = preset.baseUrl;
          }
          if (this.elements.model && !this.elements.model.value) {
            this.elements.model.value = preset.model;
          }
        }
      }

      showTestResult(message, type = 'info') {
        const el = this.elements.testResult;
        if (!el) return;
        el.textContent = message;
        el.className = `ai-gm-test-result ${type}`;
      }
    }

    // Initialize controller when DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => new LLMConfigController());
    } else {
      new LLMConfigController();
    }
  </script>
