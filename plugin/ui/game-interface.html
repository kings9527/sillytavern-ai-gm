<!-- AI-GM Game Interface — Phase 3 Surface
     主游戏界面：整合场景渲染、NPC卡片、玩家状态、出口、日志、操作面板
-->

<div class="ai-gm-game" id="ai-gm-game">
  <!-- 顶部：场景标题 + 氛围徽章 + 系统状态 -->
  <div class="ai-gm-game-header">
    <div class="ai-gm-game-scene-info">
      <span class="ai-gm-game-atm-badge" id="agm-game-atm">🌙 平静</span>
      <h2 class="ai-gm-game-scene-title" id="agm-game-title">阿卡姆之夜</h2>
    </div>
    <div class="ai-gm-game-sys-status">
      <span class="ai-gm-game-sys-item" id="agm-game-campaign-id" title="Campaign ID">—</span>
      <span class="ai-gm-game-sys-item" id="agm-game-turn-count">回合 0</span>
      <span class="ai-gm-game-sys-item" id="agm-game-combat-flag" style="display:none">⚔ 战斗中</span>
    </div>
  </div>

  <!-- 主区域：场景 + 侧边栏 -->
  <div class="ai-gm-game-main">
    <!-- 左侧：场景渲染区 -->
    <div class="ai-gm-game-scene" id="agm-game-scene-container"></div>

    <!-- 右侧：NPC + 玩家状态 -->
    <div class="ai-gm-game-sidebar">
      <div class="ai-gm-game-npcs" id="agm-game-npc-container"></div>
      <div class="ai-gm-game-player" id="agm-game-player-panel">
        <h3 class="ai-gm-game-panel-title">🎭 调查员</h3>
        <div class="ai-gm-game-player-card">
          <div class="ai-gm-game-player-name" id="agm-player-name">调查员</div>
          <div class="ai-gm-game-player-bars">
            <div class="ai-gm-game-bar-row">
              <span class="ai-gm-game-bar-label">HP</span>
              <div class="ai-gm-game-bar-track"><div class="ai-gm-game-bar-fill hp" id="agm-player-hp-bar" style="width:100%"></div></div>
              <span class="ai-gm-game-bar-val" id="agm-player-hp">10/10</span>
            </div>
            <div class="ai-gm-game-bar-row">
              <span class="ai-gm-game-bar-label">SAN</span>
              <div class="ai-gm-game-bar-track"><div class="ai-gm-game-bar-fill san" id="agm-player-san-bar" style="width:100%"></div></div>
              <span class="ai-gm-game-bar-val" id="agm-player-san">50/50</span>
            </div>
            <div class="ai-gm-game-bar-row">
              <span class="ai-gm-game-bar-label">MP</span>
              <div class="ai-gm-game-bar-track"><div class="ai-gm-game-bar-fill mp" id="agm-player-mp-bar" style="width:100%"></div></div>
              <span class="ai-gm-game-bar-val" id="agm-player-mp">10/10</span>
            </div>
          </div>
          <div class="ai-gm-game-player-stats" id="agm-player-stats"></div>
          <div class="ai-gm-game-player-inventory" id="agm-player-inventory">
            <div class="ai-gm-game-inv-title">背包</div>
            <div class="ai-gm-game-inv-list" id="agm-inv-list">空</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 中间：出口 + 可交互物 -->
  <div class="ai-gm-game-mid">
    <div class="ai-gm-game-exits" id="agm-game-exits">
      <h3 class="ai-gm-game-panel-title">🚪 出口</h3>
      <div class="ai-gm-game-exit-buttons" id="agm-exit-buttons"></div>
    </div>
    <div class="ai-gm-game-interact" id="agm-game-interact">
      <h3 class="ai-gm-game-panel-title">🔍 可交互</h3>
      <div class="ai-gm-game-interact-list" id="agm-interact-list"></div>
    </div>
  </div>

  <!-- 底部：操作面板 + 日志 -->
  <div class="ai-gm-game-bottom">
    <!-- 操作面板 -->
    <div class="ai-gm-game-actions">
      <h3 class="ai-gm-game-panel-title">🎲 操作</h3>
      <div class="ai-gm-game-action-grid">
        <button class="ai-gm-game-action-btn" data-action="move" id="btn-action-move">移动</button>
        <button class="ai-gm-game-action-btn" data-action="investigate" id="btn-action-investigate">调查</button>
        <button class="ai-gm-game-action-btn" data-action="talk" id="btn-action-talk">交谈</button>
        <button class="ai-gm-game-action-btn" data-action="combat" id="btn-action-combat">战斗</button>
        <button class="ai-gm-game-action-btn" data-action="item" id="btn-action-item">使用物品</button>
        <button class="ai-gm-game-action-btn" data-action="dice" id="btn-action-dice">掷骰</button>
        <button class="ai-gm-game-action-btn" data-action="save" id="btn-action-save">存档</button>
        <button class="ai-gm-game-action-btn secondary" data-action="menu" id="btn-action-menu">菜单</button>
      </div>
      <div class="ai-gm-game-custom-input">
        <input type="text" class="ai-gm-game-input" id="agm-custom-input" placeholder="输入自定义行动..." maxlength="200">
        <button class="ai-gm-game-input-btn" id="agm-custom-submit">执行</button>
      </div>
    </div>

    <!-- 游戏日志 -->
    <div class="ai-gm-game-log" id="agm-game-log">
      <h3 class="ai-gm-game-panel-title">📜 日志</h3>
      <div class="ai-gm-game-log-scroll" id="agm-log-scroll">
        <div class="ai-gm-game-log-empty" id="agm-log-empty">暂无记录</div>
        <div class="ai-gm-game-log-entries" id="agm-log-entries"></div>
      </div>
    </div>
  </div>
</div>

<script>
/**
 * Game Interface Controller
 * 整合场景渲染器、NPC卡片、玩家状态、日志等组件
 */
class GameInterfaceController {
  constructor() {
    this.apiBase = '/api/plugins/ai-gm';
    this.campaignId = null;
    this.sceneRenderer = null;
    this.npcRenderer = null;
    this.logEntries = [];
    this.init();
  }

  init() {
    this.bindElements();
    this.attachListeners();
    this.initSubRenderers();
  }

  bindElements() {
    this.els = {
      atmBadge: document.getElementById('agm-game-atm'),
      title: document.getElementById('agm-game-title'),
      campaignId: document.getElementById('agm-game-campaign-id'),
      turnCount: document.getElementById('agm-game-turn-count'),
      combatFlag: document.getElementById('agm-game-combat-flag'),
      sceneContainer: document.getElementById('agm-game-scene-container'),
      npcContainer: document.getElementById('agm-game-npc-container'),
      playerName: document.getElementById('agm-player-name'),
      hpBar: document.getElementById('agm-player-hp-bar'),
      hpVal: document.getElementById('agm-player-hp'),
      sanBar: document.getElementById('agm-player-san-bar'),
      sanVal: document.getElementById('agm-player-san'),
      mpBar: document.getElementById('agm-player-mp-bar'),
      mpVal: document.getElementById('agm-player-mp'),
      stats: document.getElementById('agm-player-stats'),
      invList: document.getElementById('agm-inv-list'),
      exitButtons: document.getElementById('agm-exit-buttons'),
      interactList: document.getElementById('agm-interact-list'),
      logEntries: document.getElementById('agm-log-entries'),
      logEmpty: document.getElementById('agm-log-empty'),
      customInput: document.getElementById('agm-custom-input'),
      customSubmit: document.getElementById('agm-custom-submit'),
    };
  }

  initSubRenderers() {
    // 初始化子渲染器（如果可用）
    if (window.AiGmScene?.initSceneRenderer) {
      window.AiGmScene.initSceneRenderer(this.els.sceneContainer);
    }
    if (window.AiGmNpc?.initNpcContainer) {
      window.AiGmNpc.initNpcContainer(this.els.npcContainer);
    }
  }

  attachListeners() {
    // 操作按钮
    document.querySelectorAll('.ai-gm-game-action-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const action = btn.dataset.action;
        this.onAction(action, btn);
      });
    });

    // 自定义输入
    if (this.els.customSubmit) {
      this.els.customSubmit.addEventListener('click', () => this.onCustomAction());
    }
    if (this.els.customInput) {
      this.els.customInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') this.onCustomAction();
      });
    }

    // 出口按钮代理
    if (this.els.exitButtons) {
      this.els.exitButtons.addEventListener('click', (e) => {
        const btn = e.target.closest('.ai-gm-game-exit-btn');
        if (!btn) return;
        const target = btn.dataset.target;
        this.transitionScene(target);
      });
    }

    // 交互物代理
    if (this.els.interactList) {
      this.els.interactList.addEventListener('click', (e) => {
        const item = e.target.closest('.ai-gm-game-interact-item');
        if (!item) return;
        this.interact(item.dataset.item);
      });
    }

    // NPC 事件
    document.addEventListener('ai-gm:npc-action', (e) => {
      this.onNpcAction(e.detail.npcId, e.detail.action);
    });

    document.addEventListener('ai-gm:npc-select', (e) => {
      this.onNpcSelect(e.detail.npcId);
    });
  }

  /** 加载战役状态 */
  loadCampaign(campaignId) {
    this.campaignId = campaignId;
    if (this.els.campaignId) this.els.campaignId.textContent = campaignId.slice(-8);
    this.refreshState();
  }

  /** 刷新完整状态 */
  async refreshState() {
    if (!this.campaignId) return;
    try {
      const res = await fetch(`${this.apiBase}/state/${this.campaignId}`);
      const data = await res.json();
      if (!data.success) return;
      this.updateState(data.state);
    } catch (err) {
      console.error('[GameInterface] refreshState failed:', err);
    }
  }

  /** 更新界面状态 */
  updateState(state) {
    if (!state) return;

    // 场景
    if (state.scene) {
      this.updateScene(state.scene);
    }

    // NPC
    if (state.npcs) {
      this.updateNpcs(state.npcs);
    }

    // 玩家
    if (state.player) {
      this.updatePlayer(state.player);
    }

    // 出口
    if (state.exits) {
      this.updateExits(state.exits);
    }

    // 可交互物
    if (state.interactables) {
      this.updateInteractables(state.interactables);
    }

    // 战斗标记
    if (this.els.combatFlag) {
      this.els.combatFlag.style.display = state.inCombat ? 'inline-flex' : 'none';
    }

    // 回合数
    if (this.els.turnCount && state.turnCount !== undefined) {
      this.els.turnCount.textContent = `回合 ${state.turnCount}`;
    }

    // 日志
    if (state.log) {
      this.appendLogEntries(state.log);
    }
  }

  updateScene(scene) {
    if (this.els.title) this.els.title.textContent = scene.title || '未知场景';
    if (this.els.atmBadge) {
      const atmMap = window.AiGmScene?.ATMOSPHERE_MAP || {};
      const atm = atmMap[scene.atmosphere] || atmMap.mystery || { icon: '🔮', label: '神秘' };
      this.els.atmBadge.textContent = `${atm.icon} ${atm.label}`;
    }
    if (window.AiGmScene?.renderScene) {
      window.AiGmScene.renderScene(scene);
    }
  }

  updateNpcs(npcs) {
    if (window.AiGmNpc?.renderNpcs) {
      window.AiGmNpc.renderNpcs(npcs);
    }
  }

  updatePlayer(player) {
    if (this.els.playerName) this.els.playerName.textContent = player.name || '调查员';

    const hp = player.hp ?? player.currentHp ?? 0;
    const maxHp = player.maxHp ?? 10;
    const hpPct = maxHp > 0 ? (hp / maxHp) * 100 : 0;
    if (this.els.hpBar) this.els.hpBar.style.width = `${hpPct}%`;
    if (this.els.hpVal) this.els.hpVal.textContent = `${hp}/${maxHp}`;

    const san = player.sanity ?? player.currentSan ?? 0;
    const maxSan = player.maxSanity ?? player.maxSan ?? 50;
    const sanPct = maxSan > 0 ? (san / maxSan) * 100 : 0;
    if (this.els.sanBar) this.els.sanBar.style.width = `${sanPct}%`;
    if (this.els.sanVal) this.els.sanVal.textContent = `${san}/${maxSan}`;

    const mp = player.mp ?? player.currentMp ?? 0;
    const maxMp = player.maxMp ?? 10;
    const mpPct = maxMp > 0 ? (mp / maxMp) * 100 : 0;
    if (this.els.mpBar) this.els.mpBar.style.width = `${mpPct}%`;
    if (this.els.mpVal) this.els.mpVal.textContent = `${mp}/${maxMp}`;

    if (this.els.stats && player.stats) {
      const stats = player.stats;
      const statKeys = Object.keys(stats).filter(k => k.length <= 4);
      this.els.stats.innerHTML = statKeys.map(k =>
        `<div class="stat"><span>${k}</span><span>${stats[k]}</span></div>`
      ).join('');
    }

    if (this.els.invList) {
      const items = player.inventory || [];
      this.els.invList.innerHTML = items.length
        ? items.map(it => `<span class="ai-gm-game-inv-item">${it}</span>`).join('')
        : '空';
    }
  }

  updateExits(exits) {
    if (!this.els.exitButtons) return;
    this.els.exitButtons.innerHTML = exits.length
      ? exits.map(e => `<button class="ai-gm-game-exit-btn" data-target="${e.target}">${e.label}</button>`).join('')
      : '<span style="color:var(--SmartThemeEmColor);opacity:0.7;font-size:0.85rem">没有可见的出口</span>';
  }

  updateInteractables(items) {
    if (!this.els.interactList) return;
    this.els.interactList.innerHTML = items.length
      ? items.map(it => `<button class="ai-gm-game-interact-item" data-item="${it}">${it}</button>`).join('')
      : '<span style="color:var(--SmartThemeEmColor);opacity:0.7;font-size:0.85rem">没有可交互物</span>';
  }

  appendLogEntries(entries) {
    if (!entries || !entries.length) return;
    if (this.els.logEmpty) this.els.logEmpty.style.display = 'none';

    const fragment = document.createDocumentFragment();
    entries.forEach(entry => {
      const time = entry.timestamp ? new Date(entry.timestamp).toLocaleTimeString() : '';
      const typeClass = entry.type || 'player';
      const el = document.createElement('div');
      el.className = 'ai-gm-game-log-entry';
      el.innerHTML = `
        <span class="ai-gm-game-log-time">${time}</span>
        <span class="ai-gm-game-log-type ${typeClass}">${entry.type}</span>
        <span class="ai-gm-game-log-content">${entry.content || ''}</span>
      `;
      fragment.appendChild(el);
    });

    if (this.els.logEntries) {
      this.els.logEntries.appendChild(fragment);
      this.els.logEntries.scrollTop = this.els.logEntries.scrollHeight;
    }
  }

  async onAction(action, btn) {
    if (!this.campaignId) return;
    console.log('[GameInterface] action:', action);

    switch (action) {
      case 'save':
        await this.saveGame();
        break;
      case 'dice':
        await this.rollDice();
        break;
      case 'combat':
        this.showCombatPanel();
        break;
      case 'menu':
        this.showMenu();
        break;
      default:
        await this.sendAction(action, {});
    }
  }

  async onCustomAction() {
    const input = this.els.customInput;
    if (!input || !input.value.trim() || !this.campaignId) return;

    const text = input.value.trim();
    input.value = '';
    await this.sendAction('custom', { text });
  }

  async sendAction(actionType, actionData) {
    if (!this.campaignId) return;
    try {
      const res = await fetch(`${this.apiBase}/state/action`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          campaign_id: this.campaignId,
          action_type: actionType,
          action_data: actionData,
        }),
      });
      const data = await res.json();
      if (data.success) {
        this.updateState(data);
      }
    } catch (err) {
      console.error('[GameInterface] action failed:', err);
    }
  }

  async transitionScene(sceneId) {
    await this.sendAction('scene_transition', { scene_id: sceneId });
  }

  async interact(item) {
    await this.sendAction('interact', { item });
  }

  async onNpcAction(npcId, action) {
    console.log('[GameInterface] NPC action:', npcId, action);
    if (action === 'attack') {
      await this.sendAction('combat_action', { target: npcId, action: 'attack' });
    } else if (action === 'talk') {
      await this.sendAction('talk', { npc_id: npcId });
    } else if (action === 'inspect') {
      await this.sendAction('inspect', { npc_id: npcId });
    }
  }

  onNpcSelect(npcId) {
    console.log('[GameInterface] NPC selected:', npcId);
  }

  async saveGame() {
    if (!this.campaignId) return;
    try {
      const res = await fetch(`${this.apiBase}/save`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ campaign_id: this.campaignId, slot: 1, label: '手动存档' }),
      });
      const data = await res.json();
      if (data.success) {
        alert('存档成功');
      }
    } catch (err) {
      console.error('[GameInterface] save failed:', err);
    }
  }

  async rollDice() {
    const expression = prompt('输入骰子表达式 (如 1d100):', '1d100');
    if (!expression) return;
    try {
      const res = await fetch(`${this.apiBase}/rules/dice`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ expression, label: '玩家掷骰' }),
      });
      const data = await res.json();
      if (data.success) {
        alert(`掷骰结果: ${data.result.total} (${data.result.breakdown})`);
      }
    } catch (err) {
      console.error('[GameInterface] dice roll failed:', err);
    }
  }

  showCombatPanel() {
    console.log('[GameInterface] Combat panel not yet implemented');
  }

  showMenu() {
    console.log('[GameInterface] Menu not yet implemented');
  }
}

// Initialize when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => window.AiGmGameInterface = new GameInterfaceController());
} else {
  window.AiGmGameInterface = new GameInterfaceController();
}
</script>
